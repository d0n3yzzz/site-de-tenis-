<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho — SneakerStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="carrinho.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="../paginaPrincipal/paginainicial.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      Continuar Comprando
    </a>
    <a href="../paginaPrincipal/paginainicial.html" class="logo">SNEAKER<span>STORE</span></a>
    <div class="header-right">
      <span class="step-label">Carrinho</span>
    </div>
  </header>

  <!-- MAIN -->
  <main class="cart-container">

    <!-- ITENS -->
    <section class="cart-items-wrap">
      <div class="cart-header-row">
        <h2>Seu Carrinho</h2>
        <span class="item-count" id="itemCount">0 itens</span>
      </div>
      <div id="cartItems">
        <!-- Renderizado pelo JS -->
      </div>
    </section>

    <!-- RESUMO -->
    <aside class="summary">
      <h2>Resumo do Pedido</h2>

      <div class="summary-row">
        <span>Subtotal</span>
        <span id="subtotal">R$ 0,00</span>
      </div>
      <div class="summary-row">
        <span>Frete</span>
        <span id="shipping">—</span>
      </div>
      <div class="summary-row promo-row" id="promoRow" style="display:none">
        <span>Desconto</span>
        <span id="promoValue" class="promo-value">—</span>
      </div>

      <div class="summary-divider"></div>

      <div class="summary-total">
        <span>Total</span>
        <strong id="total">R$ 0,00</strong>
      </div>

      <div class="coupon-area">
        <input type="text" id="couponInput" placeholder="Código de cupom">
        <button id="couponBtn" onclick="applyCoupon()">Aplicar</button>
      </div>
      <p class="coupon-hint" id="couponMsg"></p>

      <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">
        Finalizar Compra →
      </button>

      <div class="secure-badge">
        🔒 Pagamento 100% seguro
      </div>
    </aside>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- MODAL CHECKOUT -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-icon">✓</div>
      <h3>Pedido Realizado!</h3>
      <p>Obrigado pela sua compra. Você receberá um e-mail de confirmação em breve.</p>
      <button onclick="closeModal()">Voltar à Loja</button>
    </div>
  </div>

  <script src="carrinho.js"></script>
</body>
</html>
